apiVersion: v1
kind: Namespace
metadata:
  name: flappy-ro
---
# NOTE: Create this secret manually, do NOT commit real passwords to git:
# kubectl create secret generic flappy-secret -n flappy-ro \
#   --from-literal=POSTGRES_DB=flappydb \
#   --from-literal=POSTGRES_USER=flappy \
#   --from-literal=POSTGRES_PASSWORD=flappypass \
#   --from-literal=DATABASE_URL="postgresql://flappy:flappypass@postgres-service:5432/flappydb"
#
# The block below is a PLACEHOLDER with fake base64 values.
# Replace or use the kubectl command above.
apiVersion: v1
kind: Secret
metadata:
  name: flappy-secret
  namespace: flappy-ro
type: Opaque
data:
  POSTGRES_DB: ZmxhcHB5ZGI=         # flappydb
  POSTGRES_USER: ZmxhcHB5           # flappy
  POSTGRES_PASSWORD: ZmxhcHB5cGFzcw== # flappypass
  DATABASE_URL: cG9zdGdyZXNxbDovL2ZsYXBweT==  # placeholder - set manually!
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: flappy-ro
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # Headless for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: flappy-ro
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: flappy-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: flappy-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flappy-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-pvc
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
  volumeClaimTemplates:
    - metadata:
        name: postgres-pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs
        resources:
          requests:
            storage: 2Gi
